version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes: ["./backend/data:/app/data"]
    environment: {DATABASE_URL: "sqlite:///./data/crimemap.db"}
    restart: unless-stopped
  frontend:
    build: ./frontend
    ports: ["3001:3000"]
    depends_on: [backend]
    environment: {NEXT_PUBLIC_API_URL: "http://localhost:8000"}
    restart: unless-stopped
